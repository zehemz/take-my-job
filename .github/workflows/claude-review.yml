name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip draft PRs for automatic reviews; still respond to @claude mentions
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request. Work from the diff directly — only read files that were changed or are directly referenced by the changes. Do not explore the full codebase.

            Focus on:
            - Correctness and logic errors
            - Security issues (auth, injection, data exposure)
            - Code quality and adherence to patterns in CLAUDE.md
            - Missing loading states on mutation buttons (required by project conventions)
            - If the PR adds a new user-facing feature, verify that new E2E scenarios were added to docs/features/e2e-testing/SCENARIOS.md (do not run E2E tests — that is handled by CI)

            Post findings as inline review comments on the relevant lines.
            Use severity labels: 🔴 Important (bugs/security), 🟡 Nit (style/minor), ℹ️ Info (suggestions).
            Skip generated files and migration files.
          claude_args: "--max-turns 40 --model claude-sonnet-4-6"

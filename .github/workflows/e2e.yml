name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kobani
          POSTGRES_PASSWORD: kobani
          POSTGRES_DB: kobani_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kobani:kobani@localhost:5432/kobani_test
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-test-secret-32-chars-xxxxxxxxxx' }}
      ALLOWED_GITHUB_USERS: ci-user
      DEV_AUTH_BYPASS: 'false'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: rm -f package-lock.json && npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Migrate database
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Start server
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break || sleep 1
          done

      - name: Run e2e tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

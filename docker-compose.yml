services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: kobani
      POSTGRES_PASSWORD: kobani
      POSTGRES_DB: kobani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kobani"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
